        let history = [];

        function logChange(action) {
            const timestamp = new Date().toISOString();
            history.push({ action, timestamp });
            console.log(`Action: ${action} at ${timestamp}`);
        }

        function confirmDeleteVisit() {
            if (confirm('Are you sure you want to delete this visit?')) {
                deleteVisit();
                logChange('Deleted a visit');
            }
        }

        function confirmDeleteLitter() {
            if (confirm('Are you sure you want to delete this litter review?')) {
                deleteLitter();
                logChange('Deleted a litter review');
            }
        }

        function confirmDeleteSchedItem() {
            if (confirm('Are you sure you want to delete this scheduled item?')) {
                deleteSchedItem();
                logChange('Deleted a scheduled item');
            }
        }

        function confirmDeleteTreatment() {
            if (confirm('Are you sure you want to delete this treatment?')) {
                deleteTreatment();
                logChange('Deleted a treatment');
            }
        }
