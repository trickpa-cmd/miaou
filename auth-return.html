<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#b85c38">
<title>Miaou Sign In</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#faf5ee;color:#5a4636;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px;box-sizing:border-box}
.card{max-width:420px;width:100%;background:#fffdf9;border:1px solid #e8dcc8;border-radius:24px;padding:28px;text-align:center;box-shadow:0 10px 30px rgba(44,33,24,.08)}
.icon{font-size:44px;margin-bottom:10px}.title{font-size:30px;color:#8c3e22;font-weight:700;margin:0 0 8px}.msg{font-size:18px;line-height:1.5;margin:0;color:#7a6a58}
.small{margin-top:12px;font-size:14px;color:#9a8875}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🐾</div>
  <h1 class="title">Signing you in</h1>
  <p class="msg" id="status">Opening Google sign in…</p>
  <div class="small">Please keep this screen open until Miaou comes back.</div>
</div>
<script type="module">
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDGFwXOFdTGYGbHSKafoh6zoaQO8zABPmc",
  authDomain: "miaou-57319.firebaseapp.com",
  projectId: "miaou-57319",
  storageBucket: "miaou-57319.firebasestorage.app",
  messagingSenderId: "152797535766",
  appId: "1:152797535766:web:668885df602e2927e09f37"
};
const ALLOWED_EMAILS = ['ziadehpatrick@gmail.com','stefanie.a.hanna@gmail.com'];
const params = new URLSearchParams(location.search);
const returnTo = params.get('return') || localStorage.getItem('miaou_auth_return_to') || './index.html';
const statusEl = document.getElementById('status');
function setStatus(msg){ statusEl.textContent = msg; }
function writeStatus(obj){ try{ localStorage.setItem('miaou_auth_return_status', JSON.stringify({...obj, ts: Date.now()})); }catch(err){} }
function finishBack(){ setTimeout(()=>location.replace(returnTo), 600); }
function allowed(email){ return ALLOWED_EMAILS.includes(String(email||'').toLowerCase()); }
const { initializeApp } = await import('https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js');
const { initializeAuth, getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, browserLocalPersistence, indexedDBLocalPersistence, signOut } = await import('https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js');
const app = initializeApp(FIREBASE_CONFIG);
let auth;
try { auth = initializeAuth(app, { persistence: [indexedDBLocalPersistence, browserLocalPersistence] }); }
catch(err){ auth = getAuth(app); }
const provider = new GoogleAuthProvider();
provider.setCustomParameters({ prompt:'select_account' });
try {
  const result = await getRedirectResult(auth);
  const user = result?.user || auth.currentUser || null;
  if(user){
    const email = String(user.email || '').toLowerCase();
    if(!allowed(email)){
      await signOut(auth);
      writeStatus({ ok:false, message:'This Google account is not allowed for Miaou.' });
      setStatus('This Google account is not allowed for Miaou.');
      finishBack();
    } else {
      try{ localStorage.setItem('miaou_google_redirect_pending','0'); }catch(err){}
      writeStatus({ ok:true, email, message:'' });
      setStatus('Sign in complete. Returning to Miaou…');
      finishBack();
    }
  } else {
    try{ localStorage.setItem('miaou_google_redirect_pending','1'); }catch(err){}
    setStatus('Opening Google sign in…');
    await signInWithRedirect(auth, provider);
  }
} catch(err) {
  console.error(err);
  let message = 'Google sign in did not complete. Please try again.';
  const code = String(err?.code || '');
  if(code.includes('unauthorized-domain')) message = 'This website domain is not authorized in Firebase yet.';
  else if(code.includes('operation-not-allowed')) message = 'Google sign in is not enabled in Firebase Authentication yet.';
  else if(code.includes('network-request-failed')) message = 'Network issue while opening Google sign in.';
  writeStatus({ ok:false, message });
  setStatus(message);
  finishBack();
}
</script>
</body>
</html>
